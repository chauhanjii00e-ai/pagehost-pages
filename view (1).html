<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loading...</title>
<style>
  body { margin: 0; background: #0d0d0f; color: #f0f0f4; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(124,111,255,.3); border-top-color: #7c6fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #ff5c6a; text-align: center; font-size: 14px; max-width: 300px; line-height: 1.6; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<p id="msg" style="font-size:13px;color:#7878a0">Loading your page...</p>
<script>
(function() {
  try {
    const hash = location.hash.slice(1);
    if (!hash) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').innerHTML = '<span class="err">No page content found in URL.</span>';
      return;
    }
    // Decode base64 back to HTML
    const html = decodeURIComponent(escape(atob(hash)));
    document.open();
    document.write(html);
    document.close();
  } catch(err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').innerHTML = '<span class="err">Could not load page: ' + err.message + '</span>';
  }
})();
</script>
</body>
</html>
